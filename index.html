<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dambar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Chat Header with Profile Picture -->
        <div class="chat-header">
            <img src="damba.webp" alt="Dambar" class="profile-pic">
            <div class="header-info">
                <div class="header-name">Dambar</div>
                <div class="header-status">Online</div>
            </div>
        </div>
        
        <div class="chat" id="chatContainer"></div>
        <div class="input-area">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    class="input-field" 
                    id="userInput" 
                    placeholder="Message..."
                    autofocus
                >
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <!-- Load in this order -->

    <script src="maths.js"></script>        <!-- First: Math engine -->
    <script src="training-data.js"></script> <!-- Second: Knowledge base -->
    <script src="script.js"></script>        <!-- Third: Main script -->
</body>
</html>
